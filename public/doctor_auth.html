<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Access</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="login-container">
        <div class="card login-box">
            <h2 style="color: var(--accent);">Doctor Portal</h2>

            <!-- Tabs -->
            <div class="flex" style="margin-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1);">
                <button onclick="switchTab('login')" id="btn-login" class="tab-btn active"
                    style="flex: 1; background: transparent; border: none; padding: 1rem; color: white; cursor: pointer; border-bottom: 2px solid var(--accent);">Log
                    In</button>
                <button onclick="switchTab('signup')" id="btn-signup" class="tab-btn"
                    style="flex: 1; background: transparent; border: none; padding: 1rem; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent;">Sign
                    Up</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <input type="text" id="l-username" placeholder="Username" required>
                <input type="password" id="l-password" placeholder="Password" required>
                <button type="submit" class="btn" style="width: 100%; background: var(--accent);">Login</button>
            </form>

            <!-- Signup Form -->
            <form id="signupForm" style="display: none;">
                <input type="text" id="s-fullname" placeholder="Full Name (e.g. Dr. Strange)" required>
                <input type="text" id="s-username" placeholder="Choose Username" required>
                <input type="password" id="s-password" placeholder="Choose Password" required>
                <select id="s-specialty" required style="margin-bottom: 1rem;">
                    <option value="" disabled selected>Select Department / Specialty</option>
                    <option value="Emergency Medicine">Emergency Medicine (ER)</option>
                    <option value="Cardiology">Cardiology (Heart)</option>
                    <option value="Neurology">Neurology (Brain)</option>
                    <option value="Orthopedics">Orthopedics (Bone)</option>
                    <option value="Gastroenterology">Gastroenterology (Digestive)</option>
                    <option value="Pediatrics">Pediatrics (Child Care)</option>
                    <option value="General Surgery">General Surgery</option>
                    <option value="Pulmonology">Pulmonology (Lungs)</option>
                    <option value="Multispecialty">Multispecialty / General</option>
                </select>
                <input type="text" id="s-location" placeholder="City / Branch Location" required>
                <button type="submit" class="btn" style="width: 100%; background: var(--accent);">Register
                    Doctor</button>
            </form>

            <p id="msg" style="margin-top: 1rem; font-size: 0.9rem;"></p>
            <a href="index.html"
                style="display: block; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.8rem;">&larr; Back to
                Home</a>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const btnLogin = document.getElementById('btn-login');
            const btnSignup = document.getElementById('btn-signup');

            if (tab === 'login') {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
                btnLogin.style.borderBottomColor = 'var(--accent)';
                btnLogin.style.color = 'white';
                btnSignup.style.borderBottomColor = 'transparent';
                btnSignup.style.color = 'var(--text-muted)';
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
                btnSignup.style.borderBottomColor = 'var(--accent)';
                btnSignup.style.color = 'white';
                btnLogin.style.borderBottomColor = 'transparent';
                btnLogin.style.color = 'var(--text-muted)';
            }
        }

        // Handle Login
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('l-username').value;
            // Demo Logic
            const user = { name: username, role: 'doctor' };
            localStorage.setItem('user', JSON.stringify(user));
            window.location.href = 'dashboard.html';
        });

        // Handle Signup
        document.getElementById('signupForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('s-fullname').value;
            const special = document.getElementById('s-specialty').value;
            const location = document.getElementById('s-location').value;

            // Register Doctor in Global List for Patients to see
            const newDoc = { name, specialty: special, location, id: Date.now() };
            const docs = JSON.parse(localStorage.getItem('registeredDoctors') || '[]');
            docs.push(newDoc);
            localStorage.setItem('registeredDoctors', JSON.stringify(docs));

            // Login
            const user = { name: name, role: 'doctor', specialty: special, location: location };
            localStorage.setItem('user', JSON.stringify(user));

            alert('Registration Successful! Logging in...');
            window.location.href = 'dashboard.html';
        });
    </script>
    <!-- Glitter -->
    <script src="js/glitter.js"></script>
</body>

</html>
